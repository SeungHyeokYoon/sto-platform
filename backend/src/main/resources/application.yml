spring:
  application:
    name: sto-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/sto
    username: sto
    password: sto
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update   # 개발 골격 단계: 엔티티 기준 스키마 자동 반영(추후 Flyway 전환 검토)
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

# 블록체인(체인) 연동 설정 — 값은 환경변수로 주입(.env.example 참조)
sto:
  chain:
    # RPC URL은 비밀이 아니므로 로컬 Anvil 기본값 허용
    rpc-url: ${STO_CHAIN_RPC_URL:http://127.0.0.1:8545}
    # 계좌관리기관(agent) 서명 키 — 반드시 환경변수로 주입(yml에 평문 보관 금지)
    agent-private-key: ${STO_CHAIN_AGENT_PRIVATE_KEY:}
    # 배포 후 채워지는 SecurityToken 컨트랙트 주소
    contract-address: ${STO_CHAIN_CONTRACT_ADDRESS:}

logging:
  level:
    com.sto.platform: DEBUG
