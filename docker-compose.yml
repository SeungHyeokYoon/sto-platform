services:
  postgres:
    image: postgres:16
    container_name: sto-postgres
    environment:
      POSTGRES_DB: sto
      POSTGRES_USER: sto
      POSTGRES_PASSWORD: sto
    ports:
      - "5432:5432"
    volumes:
      - sto-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sto -d sto"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sto-pgdata:
